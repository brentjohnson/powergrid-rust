name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-server
            os: ubuntu-latest
            package: powergrid-server
            binary: powergrid-server
            artifact: powergrid-server-linux-x86_64

          - name: linux-server-arm
            os: ubuntu-24.04-arm
            package: powergrid-server
            binary: powergrid-server
            artifact: powergrid-server-linux-aarch64

          - name: linux-client
            os: ubuntu-latest
            package: powergrid-client
            binary: powergrid-client
            artifact: powergrid-client-linux-x86_64
            system_deps: g++ pkg-config libx11-dev libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev

          - name: linux-client-arm
            os: ubuntu-24.04-arm
            package: powergrid-client
            binary: powergrid-client
            artifact: powergrid-client-linux-aarch64
            system_deps: g++ pkg-config libx11-dev libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev

          - name: windows-client
            os: windows-latest
            package: powergrid-client
            binary: powergrid-client.exe
            artifact: powergrid-client-windows-x86_64.exe

          - name: macos-client-arm
            os: macos-latest
            package: powergrid-client
            binary: powergrid-client
            artifact: powergrid-client-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache build output
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ matrix.artifact }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-${{ matrix.artifact }}-

      - name: Install system dependencies
        if: matrix.system_deps != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.system_deps }}

      - name: Build
        run: cargo build --release -p ${{ matrix.package }}

      - name: Stage artifact (Unix)
        if: runner.os != 'Windows'
        run: cp target/release/${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item target/release/${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            powergrid-server-linux-x86_64
            powergrid-server-linux-aarch64
            powergrid-client-linux-x86_64
            powergrid-client-linux-aarch64
            powergrid-client-windows-x86_64.exe
            powergrid-client-macos-aarch64

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/powergrid-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
