name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-server
            os: ubuntu-latest
            package: powergrid-server
            binary: powergrid-server
            artifact: powergrid-server-linux-x86_64

          - name: linux-client
            os: ubuntu-latest
            package: powergrid-client
            binary: powergrid-client
            artifact: powergrid-client-linux-x86_64

          - name: linux-server-arm
            os: ubuntu-24.04-arm
            package: powergrid-server
            binary: powergrid-server
            artifact: powergrid-server-linux-aarch64

          - name: linux-client-arm
            os: ubuntu-24.04-arm
            package: powergrid-client
            binary: powergrid-client
            artifact: powergrid-client-linux-aarch64

          - name: windows-client
            os: windows-latest
            package: powergrid-client
            binary: powergrid-client.exe
            artifact: powergrid-client-windows-x86_64.exe

          - name: macos-client-arm
            os: macos-latest
            package: powergrid-client
            binary: powergrid-client
            artifact: powergrid-client-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libxkbcommon-dev \
            libwayland-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            libx11-dev \
            libxcb1-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxtst-dev \
            libfontconfig1-dev \
            libfreetype-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache build output
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ matrix.package }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-${{ matrix.package }}-

      - name: Build
        run: cargo build --release -p ${{ matrix.package }}

      - name: Stage artifact (Unix)
        if: runner.os != 'Windows'
        run: cp target/release/${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item target/release/${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            powergrid-server-linux-x86_64
            powergrid-server-linux-aarch64
            powergrid-client-linux-x86_64
            powergrid-client-linux-aarch64
            powergrid-client-windows-x86_64.exe
            powergrid-client-macos-aarch64
