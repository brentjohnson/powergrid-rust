services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: powergrid
      POSTGRES_PASSWORD: powergrid
      POSTGRES_DB: powergrid
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U powergrid -d powergrid"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Uncomment to expose Postgres to the host for debugging:
    # ports: ["5432:5432"]

  server:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - RUST_LOG=info

  lobby:
    build:
      context: .
      dockerfile: Dockerfile.lobby
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
      - RUST_LOG=info
      - DATABASE_URL=postgres://powergrid:powergrid@postgres:5432/powergrid
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg-data:
